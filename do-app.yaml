# DigitalOcean App Platform spec for Amazon Intelligence MCP Proxy
# Deploy: doctl apps create --spec do-app.yaml
# Update: doctl apps update <app-id> --spec do-app.yaml

name: amazon-intel-mcp
region: nyc

services:
  - name: mcp-proxy
    dockerfile_path: Dockerfile.mcp
    github:
      repo: Dolapo001/Amazon-Intel
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb  # $5/mo — plenty for a proxy
    envs:
      - key: BACKEND_URL
        value: "https://amazon-intel-60a3175875c6.herokuapp.com"
      - key: PORT
        value: "3000"
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
