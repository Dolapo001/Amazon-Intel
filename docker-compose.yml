services:

  # ── MCP Proxy (Context Protocol marketplace endpoint) ─────────────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    environment:
      BACKEND_URL: http://web:5000
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - web
    restart: unless-stopped

  # ── Web Application ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:5000 --workers 4 --timeout 120
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    volumes:
      - ./ml_models:/app/ml_models
      - ./apps:/app/apps
      - ./config:/app/config
      - ./manage.py:/app/manage.py
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Celery Default Worker ──────────────────────────────────────────────────
  celery_worker_default:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery worker -Q celery,default -c 4 -l info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml_models:/app/ml_models
      - ./apps:/app/apps
      - ./config:/app/config
      - ./manage.py:/app/manage.py
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Celery High-Priority Worker ────────────────────────────────────────────
  celery_worker_high:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery worker -Q high_priority -c 8 -l info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./ml_models:/app/ml_models
      - ./apps:/app/apps
      - ./config:/app/config
      - ./manage.py:/app/manage.py
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Celery Beat Scheduler ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery beat -l info -s /tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./manage.py:/app/manage.py
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amazon_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amazon_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ClickHouse ─────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.4
    ports:
      - "8125:8123"   # HTTP interface
      - "9002:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
